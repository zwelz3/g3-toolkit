services:
  claude-code:
    image: claude-code-cui:latest
    cap_add:
      - NET_ADMIN
      - NET_RAW
    env_file:
      - ../.env
    environment:
      - ANTHROPIC_BASE_URL=http://localhost:4000
      - CLAUDE_CONFIG_DIR=/home/vscode/.claude
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - NODE_OPTIONS=--max-old-space-size=4096
    volumes:
      - ..:/workspace:cached
      - claude-config:/home/vscode/.claude
      - claude-memory:/home/vscode/.claude-memory
      - claude-logs:/var/log/claude-proxy
      - claude-tokens:/home/vscode/.ekga
    # Uncomment for VPN/internal DNS:
    # dns:
    #   - 10.x.x.x
    # extra_hosts:
    #   - "git.internal.example.com:10.x.x.x"
    stdin_open: true
    tty: true

volumes:
  claude-config:
  claude-memory:
  claude-logs:
  claude-tokens:
