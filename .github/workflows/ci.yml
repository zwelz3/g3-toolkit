name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual runs on ANY branch (owner request: CI without a
  # main-based branch or an open PR).
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reject literal brace-glob paths
        # Catches the failure mode where an agent or script ran `mkdir -p src/{a,b}` in a shell
        # that doesn't expand braces (POSIX sh, dash), creating literal directories named with
        # brace characters. Cheap to run; fails fast.
        run: |
          found=$(find . -path ./node_modules -prune -o \( -name '*{*' -o -name '*}*' \) -print | grep -v ^./node_modules || true)
          if [ -n "$found" ]; then
            echo "FAIL: literal brace-glob paths present:"
            echo "$found"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # pnpm version comes from the packageManager field in package.json;
      # do NOT also set `version:` here or pnpm/action-setup errors with
      # "Multiple versions of pnpm specified".
      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run lint
      # verify includes build:packages as its first step, so dist/ files
      # exist by the time it finishes. Must run BEFORE test because
      # public-api.test.ts checks that every exports-map target file
      # exists on disk (existsSync on dist/*.mjs).
      - run: pnpm run verify
      - run: pnpm run test

  spec-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      # Both scripts exit non-zero on findings (the original linter
      # returned 0 unconditionally; two audits flagged the gate as
      # decorative before it was fixed).
      - run: python scripts/lint_specs.py specs/
      - run: python scripts/sync_spec_status.py
      # Every in-progress/proposed requirement must be owned by exactly
      # one roadmap file (contract in roadmap/CLAUDE.md).
      - run: python scripts/check_roadmap_coverage.py

  perf:
    # PRF benchmarks (MR-5 execution). Owner ruling 2026-07-12: this
    # runner class IS the baseline machine profile. Budgets are
    # report-only while planning/g3l/prf-budgets.json is
    # "provisional"; after the one permitted revision they freeze and
    # a miss fails this job.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # pnpm version from the packageManager field; do NOT set `version:`
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: G3T_PERF=1 pnpm vitest run tests/perf
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prf-results
          path: tests/perf/last-results.json

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # pnpm version from the packageManager field; do NOT set `version:`
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
        # Snapshot policy lives in playwright.config.ts
        # (ignoreSnapshots, opt-in via PW_SNAPSHOTS until Linux
        # baselines are committed; the enablement flip is documented
        # there). Do NOT reintroduce a `-- --flag` here: pnpm forwards
        # the `--` literally and playwright reads the flag as a
        # test-file regex, matching zero tests.
      - run: pnpm run test:e2e
        env:
          CI: "true"
      # Failures-only digest (owner upload workflow): megabytes of
      # passing noise filtered to the failures + errors + attachment
      # paths. Runs on success too (writes an all-green stub).
      - run: pnpm run e2e:failures
        if: always()
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-failures-digest
          path: test-results-failures.json
          if-no-files-found: ignore
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
