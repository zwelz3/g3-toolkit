name: Docs & Lint

on:
  push:
    branches: [main]
    paths: ["specs/**", "docs/**", "scripts/**"]
  pull_request:
    branches: [main]
    paths: ["specs/**", "docs/**", "scripts/**"]

jobs:
  lint-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - run: pixi run lint-specs

  build-docs:
    runs-on: ubuntu-latest
    needs: lint-specs
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.8
      - run: pixi run docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-docs:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
