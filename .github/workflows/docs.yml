name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual trigger

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # pnpm version from packageManager field
      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      # Build packages first (TypeDoc needs the compiled types,
      # Storybook needs the package exports to resolve)
      - run: pnpm run build:packages

      # Generate API reference (TypeDoc → docs-out/api/)
      # One assembly path, shared with local builds: API reference,
      # Storybook, playground, the visual-acceptance walkthrough, and
      # the landing page (docs:build in package.json owns the steps,
      # so CI and `pnpm run docs:build` cannot drift apart).
      - run: pnpm run docs:build

      # Upload to GitHub Pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
